<h3>帮助中心</h3>
<div class="help-section">
    <h4>常见问题</h4>
    <ul>
        <li><strong>如何注册？</strong> 点击导航栏"注册"按钮，填写用户名、密码、邮箱和手机号即可。</li>
        <li><strong>如何充值？</strong> 登录后进入"个人中心"，在充值表单中输入金额并提交。</li>
        <li><strong>如何搜索用户？</strong> 登录后在搜索框中输入用户名或邮箱关键词。</li>
        <li><strong>如何上传头像？</strong> 登录后点击"上传头像"，选择图片文件上传。</li>
    </ul>
</div>
